# The modifying hygiene hooks are restricted to first-party paths so they
# don't churn the pre-existing resources/ tree, generated artifacts, or
# legacy docs. ruff is scoped via pyproject.toml (force-exclude). A
# repo-wide hygiene normalization is deliberately out of scope here.
files: '^(tests/|\.github/|pyproject\.toml|\.pre-commit-config\.yaml)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
